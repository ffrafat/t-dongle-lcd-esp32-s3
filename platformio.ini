; PlatformIO Project Configuration File for T-Dongle-S3
; 
; Use the Project Environment Switcher in the status bar to pick which example to build.

[platformio]
default_envs = 01_day_date
src_dir = examples

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Memory & Flash Settings
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Build Flags for Hardware and Display
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_HAS_PSRAM
	-D USER_SETUP_LOADED=1
	-D ST7735_DRIVER=1
	-D TFT_WIDTH=80
	-D TFT_HEIGHT=160
	-D ST7735_GREENTAB160x80=1
	-D TFT_RGB_ORDER=TFT_BGR
	-D TFT_INVERSION_ON=1
	-D TFT_MOSI=3
	-D TFT_SCLK=5
	-D TFT_CS=4
	-D TFT_DC=2
	-D TFT_RST=1
	-D TFT_BL=38
	-D TFT_BACKLIGHT_ON=HIGH
	-D USE_HSPI_PORT
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_FONT6=1
	-D LOAD_FONT7=1
	-D LOAD_FONT8=1
	-D LOAD_GFXFF=1
	-D SMOOTH_FONT=1
	-D SPI_FREQUENCY=27000000

; Global Library Dependencies
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	mathertel/OneButton@^2.6.1
	fastled/FastLED@^3.9.4

; --- EXAMPLES ---

[env:01_day_date]
build_src_filter = +<01_day_date/src/>
